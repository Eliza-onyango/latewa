name: Deploy Latewa Platform

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to netcup VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 159.195.192.89
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }} # You still need this one so GitHub can log in via SSH
          script: |
            cd /root/latewa
            
            # 1. Pull latest code from GitHub
            git pull origin main
            
            # 2. Update Backend Dependencies and Restart
            cd backend
            npm install --production
            node migrate.js 
            pm2 restart latewa-backend || pm2 start index.js --name "latewa-backend"
            
            # 3. Update Frontend Build
            cd ../frontend
            npm install
            npm run build
